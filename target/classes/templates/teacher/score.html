<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head th:include="common/common_head::commonHeader"></head>

<body>
<div class="page">
  <div th:include="common/common_mainnavbar :: commonMainNavbar"></div>

  <div class="page-content d-flex align-items-stretch">
    <div th:include="common/common_navigation :: commonNavigation"></div>

    <div class="content-inner">
      <header class="page-header">
        <div class="container-fluid">
          <h2 class="no-margin-bottom">导师评分</h2>
        </div>
      </header>

      <div class="breadcrumb-holder container-fluid">
        <ul class="breadcrumb">
          <li class="breadcrumb-item"><a th:href="@{/index}">首页</a></li>
          <li class="breadcrumb-item active">导师评分</li>
        </ul>
      </div>

      <section class="container-fluid">
        <div class="row mt-4">
          <div class="col-lg-12">
            <div class="card">
              <div class="card-header">
                <h3>选择项目</h3>
              </div>
              <div class="card-body">
                <div class="form-group">
                  <label for="projectSelect"><strong>请选择要评分的项目</strong></label>
                  <select class="form-control" id="projectSelect" name="projectId">
                    <option value="">-- 请选择项目 --</option>
                  </select>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="row mt-4">
          <div class="col-lg-12">
            <div class="card">
              <div class="card-header d-flex justify-content-between align-items-center">
                <h3>评分表单</h3>
                <span class="badge badge-primary">权重：自我20% + 团队30% + 导师40% + 外部10%</span>
              </div>
              <div class="card-body">
                <form id="evaluationForm">
                  <div class="form-group">
                    <label for="score"><strong>请输入评分（0-100分）</strong></label>
                    <div class="input-group">
                      <input type="number" class="form-control" id="score" name="score"
                             min="0" max="100" placeholder="0-100分" required>
                      <div class="input-group-append">
                        <span class="input-group-text">分</span>
                      </div>
                    </div>
                  </div>

                  <div class="form-group text-center mt-4">
                    <button type="submit" class="btn btn-primary btn-lg mr-3">
                      <i class="fa fa-save"></i> 提交评分
                    </button>
                    <button type="button" class="btn btn-secondary btn-lg" onclick="resetForm()">
                      <i class="fa fa-refresh"></i> 重置
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>

        <div class="row mt-4" id="scoreResultSection" style="display:none;">
          <div class="col-lg-12">
            <div class="card">
              <div class="card-header">
                <h3>项目评分结果</h3>
              </div>
              <div class="card-body">
                <div class="table-responsive">
                  <table class="table table-striped table-hover">
                    <thead class="thead-dark">
                      <tr>
                        <th>评价维度</th>
                        <th>权重</th>
                        <th>平均分</th>
                      </tr>
                    </thead>
                    <tbody id="scoreTableBody">
                      <tr><td>自我评价</td><td>20%</td><td id="selfAvg">-</td></tr>
                      <tr><td>团队评价</td><td>30%</td><td id="teamAvg">-</td></tr>
                      <tr><td>导师评价</td><td>40%</td><td id="mentorAvg">-</td></tr>
                      <tr><td>外部评价</td><td>10%</td><td id="externalAvg">-</td></tr>
                      <tr class="table-primary font-weight-bold">
                        <td colspan="2">综合得分</td>
                        <td id="totalScore">-</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <div th:include="common/common_footer :: commonFooter"></div>
    </div>
  </div>
</div>

<div th:include="common/common_onload_js :: onLoadJs"></div>

<script th:inline="javascript">
$(document).ready(function() {
  console.log('页面加载完成');
  loadProjects();

  const projectId = [[${projectId}]];
  if (projectId) {
    $('#projectSelect').val(projectId);
    loadProjectScore(projectId);
  }

  $('#evaluationForm').submit(function(e) {
    e.preventDefault();
    submitScore();
  });

  $('#projectSelect').change(function() {
    const selectedProjectId = $(this).val();
    if (selectedProjectId) {
      loadProjectScore(selectedProjectId);
    }
  });
});

function loadProjects() {
  console.log('加载项目列表');
  const teacherId = [[${teacherId}]];
  console.log('当前教师ID:', teacherId);

  if (!teacherId) {
    console.error('教师ID为空，请先登录');
    return;
  }

  $.ajax({
    url: '/api/project/teacher-projects',
    method: 'GET',
    data: { teacherId: teacherId },
    dataType: 'json',
    success: function(res) {
      console.log('项目列表返回:', res);
      $('#projectSelect').empty();
      $('#projectSelect').append('<option value="">-- 请选择项目 --</option>');
      if (res.data && res.data.length > 0) {
        res.data.forEach(function(project) {
          console.log('添加项目:', project.projectId, project.projectName);
          $('#projectSelect').append('<option value="' + project.projectId + '">' + project.projectName + '</option>');
        });
      }
    },
    error: function(xhr, status, error) {
      console.error('加载项目失败:', error);
    }
  });
}

function loadProjectScore(projectId) {
  $.ajax({
    url: '/api/evaluation/project/' + projectId,
    method: 'GET',
    success: function(res) {
      if (res.state === 200 && res.data && !res.data.message) {
        $('#scoreResultSection').show();
        $('#selfAvg').text(res.data.self || 0);
        $('#teamAvg').text(res.data.team || 0);
        $('#mentorAvg').text(res.data.mentor || 0);
        $('#externalAvg').text(res.data.external || 0);
        $('#totalScore').text(res.data.totalScore || 0);
      }
    }
  });
}

function submitScore() {
  const projectId = $('#projectSelect').val();
  const score = $('#score').val();

  if (!projectId) {
    alert('请选择要评分的项目');
    return;
  }

  if (!score || score < 0 || score > 100) {
    alert('请输入0-100之间的分数');
    return;
  }

  const teacherId = [[${teacherId}]];
  const scoreData = {
    projectId: parseInt(projectId),
    userId: teacherId,
    score: parseFloat(score),
    scoreType: 'mentor'
  };

  $.ajax({
    url: '/api/evaluation/submit',
    method: 'POST',
    contentType: 'application/json',
    data: JSON.stringify(scoreData),
    success: function(res) {
      if (res.state === 200) {
        alert('评分提交成功！');
        loadProjectScore(projectId);
        resetForm();
      } else {
        alert('评分提交失败：' + res.message);
      }
    },
    error: function() {
      alert('评分提交失败，请重试');
    }
  });
}

function resetForm() {
  $('#evaluationForm')[0].reset();
}
</script>
</body>
</html>
